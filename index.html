<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <h1 class="heading">Rock Paper Scissor</h1>
    <div class="main-player-div">
      <div class="player1">
        <div>
          <h1>Player 1</h1>
          <button class="start-btn" onClick="play1()" id="p1">Start</button>
        </div>
        <div>
          <lable class="game-label" id="p1l">Start Playing</lable>
        </div>
      </div>
      <div class="player2">
        <div>
          <lable class="game-label" id="p2l">Start Playing</lable>
        </div>
        <div>
          <h1>Player 2</h1>
          <button class="start-btn" onClick="play2()" id="p2">Start</button>
        </div>
      </div>
    </div>

    <div class="win-div">
      <label class="win" id="winl">Start game</label>
    </div>

    <div class="points-table">
      <h1>Points Table</h1>
      <table class="actual-points-table" id="game-played">
        <tr>
          <th class="actual-points-table" style="width: 10%">Game number</th>
          <th class="actual-points-table">Player 1</th>
          <th class="actual-points-table">Player 2</th>
        </tr>
      </table>
      <div class="points-div">
        <label id="tgp" class="points">Total Game Played: 0</label><br />
        <label id="tp1p" class="points">Player 1 Total points: 0</label><br />
        <label id="tp2p" class="points">Player 2 Total points: 0</label><br />
      </div>
    </div>
    <script>
      let player1;
      let player2;
      let game = 0,
        p1game = 0,
        p2game = 0;
      let p1Turn = false,
        p2Turn = false;
      let innerHTMLSaver1, innerHTMLSaver2;
      let gate = true;
      function play1() {
        player1 = Math.floor(Math.random() * 3 + 1);
        document.getElementById("p1").disabled = true;
        p1Turn = true;
        if (p1Turn === true && p2Turn === true) {
          play();
        }
      }
      function play2() {
        player2 = Math.floor(Math.random() * 3 + 1);
        document.getElementById("p2").disabled = true;
        p2Turn = true;
        if (p1Turn === true && p2Turn === true) {
          play();
        }
      }

      function play() {
        p1Turn = false;
        p2Turn = false;
        document.getElementById("p1").disabled = false;
        document.getElementById("p2").disabled = false;
        let innerHTML, p1p, p2p;
        let play1Turn, play2Turn;
        switch (player1) {
          case 1: {
            play1Turn = "Rock";
            break;
          }
          case 2: {
            play1Turn = "Paper";
            break;
          }
          case 3: {
            play1Turn = "Scissor";
            break;
          }
        }

        switch (player2) {
          case 1: {
            play2Turn = "Rock";
            break;
          }
          case 2: {
            play2Turn = "Paper";
            break;
          }
          case 3: {
            play2Turn = "Scissor";
            break;
          }
        }

        document.getElementById("p1l").innerText = play1Turn;
        document.getElementById("p2l").innerText = play2Turn;
        if (
          (play1Turn === "Rock" && play2Turn === "Rock") ||
          (play1Turn === "Paper" && play2Turn === "Paper") ||
          (play1Turn === "Scissor" && play2Turn === "Scissor")
        ) {
          p1p = 1;
          p2p = 1;
          p1game++;
          p2game++;
          game++;
          document.getElementById("winl").innerText = "Tie";
        }
        if (
          (play1Turn === "Rock" && play2Turn === "Scissor") ||
          (play1Turn === "Paper" && play2Turn === "Rock") ||
          (play1Turn === "Scissor" && play2Turn === "Paper")
        ) {
          p1p = 1;
          p2p = 0;
          game++;
          p1game++;
          document.getElementById("winl").innerText = "P1 Won";
        }
        if (
          (play2Turn === "Rock" && play1Turn === "Scissor") ||
          (play2Turn === "Paper" && play1Turn === "Rock") ||
          (play2Turn === "Scissor" && play1Turn === "Paper")
        ) {
          p1p = 0;
          p2p = 1;
          game++;
          p2game++;
          document.getElementById("winl").innerText = "P2 Won";
        }

        if (gate === false) {
          innerHTMLSaver1 = innerHTMLSaver1 + `<tr>`;
          innerHTMLSaver1 =
            innerHTMLSaver1 + `<td class="actual-points-table">${game}</td>`;
          innerHTMLSaver1 =
            innerHTMLSaver1 + `<td class="actual-points-table">${p1p}</td>`;
          innerHTMLSaver1 =
            innerHTMLSaver1 + `<td class="actual-points-table">${p2p}</td>`;
          innerHTMLSaver1 = innerHTMLSaver1 + `</tr>`;

          innerHTML = innerHTMLSaver1;

          innerHTML = innerHTML + `<tr>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>Total</b></td>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>${p1game}</b></td>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>${p2game}</b></td>`;
          innerHTML = innerHTML + `</tr>`;
        }

        if (gate === true) {
          innerHTML = document.getElementById("game-played").innerHTML;
          innerHTML = innerHTML + `<tr>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table">${game}</td>`;
          innerHTML = innerHTML + `<td class="actual-points-table">${p1p}</td>`;
          innerHTML = innerHTML + `<td class="actual-points-table">${p2p}</td>`;
          innerHTML = innerHTML + `</tr>`;
        }

        if (gate === true) {
          innerHTMLSaver1 = innerHTML;
          gate = false;
          innerHTML = innerHTMLSaver1;

          innerHTML = innerHTML + `<tr>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>Total</b></td>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>${p1game}</b></td>`;
          innerHTML =
            innerHTML + `<td class="actual-points-table"><b>${p2game}</b></td>`;
          innerHTML = innerHTML + `</tr>`;
        }

        document.getElementById("game-played").innerHTML = innerHTML;

        document.getElementById("tgp").innerHTML = `Total Game Played: ${game}`;
        document.getElementById(
          "tp1p"
        ).innerHTML = `Total Game Played: ${p1game}`;
        document.getElementById(
          "tp2p"
        ).innerHTML = `Total Game Played: ${p2game}`;
      }
    </script>
  </body>
</html>
